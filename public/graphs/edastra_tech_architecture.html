<style>

}
body { margin: 0; padding: 0; background: #fff; }
.wrap{font-family:var(--font-sans);padding:1rem 0 2rem;}
.tab-row{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;padding:0 1rem;}
.tab{padding:6px 16px;border-radius:99px;font-size:12px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);transition:all .15s;}
.tab.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent;}
.panel{display:none;}
.panel.active{display:block;}
.th{font-size:13px;font-weight:700;fill:var(--color-text-primary);}
.ts{font-size:11px;fill:var(--color-text-secondary);}

/* Color classes for SVG groups */
.c-purple rect{fill:#EDE9F6;stroke:#7F77DD;} .c-purple text.th{fill:#4A3FA0;}
